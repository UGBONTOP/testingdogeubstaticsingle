<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="https://fontonwonton.github.io/icon.svg">
  <meta name="viewport" content="initial-scale=1, width=device-width">
  <title>Loading...</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #111827; color: #a0b0c8; font-family: sans-serif; }
    #loader { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; gap: 12px; }
    #loader span { font-size: 14px; opacity: 0.6; }
    .spinner { width: 36px; height: 36px; border: 3px solid rgba(255,255,255,0.2); border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div id="loader">
  <div class="spinner"></div>
  <span id="status">Loading…</span>
</div>
<script>
(async function () {
  const BASE = 'https://fontonwonton.github.io/';
  const CDN  = 'https://cdn.jsdelivr.net/gh/fontonwonton/fontonwonton.github.io@main/';
  const status = document.getElementById('status');
  function log(msg) { console.log(msg); if (status) status.textContent = msg; }

  async function fetchText(url) {
    try { const r = await fetch(url); if (!r.ok) return null; return await r.text(); }
    catch { return null; }
  }
  async function fetchDataURL(url) {
    try {
      const r = await fetch(url); if (!r.ok) return null;
      const blob = await r.blob();
      return await new Promise(res => { const fr = new FileReader(); fr.onload = () => res(fr.result); fr.readAsDataURL(blob); });
    } catch { return null; }
  }
  async function inlineCSS(css, cssBase) {
    const urlRe = /url\(['"]?([^'")]+)['"]?\)/g;
    const matches = [...css.matchAll(urlRe)];
    const replacements = await Promise.all(matches.map(async m => {
      const raw = m[1];
      if (raw.startsWith('data:') || raw.startsWith('http') || raw.startsWith('//')) return [m[0], m[0]];
      try {
        const abs = new URL(raw, cssBase).href;
        const du = await fetchDataURL(abs);
        return du ? [m[0], `url('${du}')`] : [m[0], m[0]];
      } catch { return [m[0], m[0]]; }
    }));
    for (const [orig, repl] of replacements) if (orig !== repl) css = css.split(orig).join(repl);
    return css;
  }

  // Redirect dead baylib.top wisp to working servers
  const _wispServers = ['wss://wisp.mercurywork.shop/', 'wss://anura.pro/wisp/', 'wss://wisp.anime.black/'];
  let _wispIdx = 0;
  const NativeWS = window.WebSocket;
  window.WebSocket = function(url) {
    const args = Array.from(arguments);
    if (typeof url === 'string' && url.includes('baylib.top')) {
      args[0] = _wispServers[_wispIdx % _wispServers.length];
      console.log('[wisp] ->', args[0]);
      const ws = new (Function.prototype.bind.apply(NativeWS, [null].concat(args)));
      ws.addEventListener('close', e => { if (e.code !== 1000) _wispIdx++; });
      return ws;
    }
    return new (Function.prototype.bind.apply(NativeWS, [null].concat(args)));
  };
  Object.assign(window.WebSocket, { CONNECTING:0, OPEN:1, CLOSING:2, CLOSED:3 });
  window.WebSocket.prototype = NativeWS.prototype;

  // Swallow 404 autocomplete calls
  const _fetch = window.fetch;
  window.fetch = function(input, init) {
    const url = typeof input === 'string' ? input : (input instanceof Request ? input.url : String(input));
    if (url.includes('return?q=') || url.includes('/return?')) {
      return Promise.resolve(new Response('[]', { status: 200, headers: { 'Content-Type': 'application/json' } }));
    }
    return _fetch.apply(this, arguments);
  };

  async function build() {
    log('Fetching CSS…');
    // Use exact CSS files from the real site's <head>
    const cssUrls = [
      CDN + 'assets/BuigefS6.css',
      CDN + 'assets/CKbESb27.css',
      CDN + 'assets/BNFcjL6o.css',
      'https://fontonwonton.github.io/assets/B2Ha-z0G.css',
    ];
    const cssRaws = await Promise.all(cssUrls.map(u => fetchText(u)));

    log('Inlining CSS…');
    const cssInlined = await Promise.all(cssRaws.map((raw, i) =>
      raw ? inlineCSS(raw, cssUrls[i].replace(/[^/]+$/, '')) : Promise.resolve('')
    ));

    log('Launching…');
    cssInlined.forEach(css => {
      if (!css) return;
      const s = document.createElement('style'); s.textContent = css; document.head.appendChild(s);
    });

    document.title = 'v5-static-5.0.42';
    document.body.innerHTML = '<div id="root"></div>';

    // Importmap — all chunks from CDN
    const chunks = [
      'chunks/Home.COV9ZnaQ.js', 'chunks/Apps.BKPNwXsB.js', 'chunks/Apps2.Vf9IEnZN.js',
      'chunks/apps.module.rR2HfwBL.js', 'chunks/Settings.VPmeMG9-.js', 'chunks/Player.Bn6xymlp.js',
      'chunks/vendor-modules.kyFu_h-i.js', 'chunks/localGmLoader.D7XJ6s2_.js', 'chunks/Nav.AqMabdpf.js',
    ];
    const imports = {};
    for (const entry of ['./DGNXy8Zi.js', '../DGNXy8Zi.js', 'DGNXy8Zi.js']) imports[entry] = CDN + 'DGNXy8Zi.js';
    for (const f of ['./scramjet.all.js','../scramjet.all.js','scramjet.all.js','./eggs/scramjet.all.js','../eggs/scramjet.all.js','eggs/scramjet.all.js']) {
      imports[f] = CDN + 'scramjet.all.js';
    }
    for (const c of chunks) {
      const file = c.split('/').pop();
      // Map both CDN and github.io paths since app may reference either
      for (const prefix of ['./', '../', '../../', '']) imports[prefix + c] = CDN + c;
      for (const prefix of ['./', '../', '../../', '']) imports[prefix + file] = CDN + c;
    }

    const im = document.createElement('script');
    im.type = 'importmap';
    im.textContent = JSON.stringify({ imports });
    document.head.appendChild(im);

    // Load asc-static.js (handles app init on the real static site)
    const asc = document.createElement('script');
    asc.src = CDN + 'asc-static.js';
    asc.onerror = () => console.warn('[asc-static] not found, skipping');
    document.head.appendChild(asc);

    // Main entry
    const mod = document.createElement('script');
    mod.type = 'module';
    mod.src = CDN + 'DGNXy8Zi.js';
    document.body.appendChild(mod);
  }

  try { await build(); }
  catch(err) { log('Error: ' + err.message); console.error(err); }
})();
</script>
</body>
</html>
